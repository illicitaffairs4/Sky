<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FFF9FB;
    --pink-soft: #FFE4EC;
    --pink-mid: #F8B6CD;
    --rose: #E8829E;
    --plum-text: #5C4456;
    --plum-deep: #2C2436;
    --plum-deep-2: #3A2E47;
    --gold: #F0B86E;
    --line: rgba(92, 68, 86, 0.12);
    --shadow: 0 2px 16px rgba(92, 68, 86, 0.08);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--plum-text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(circle at 10% 8%, var(--pink-soft) 0%, transparent 45%),
      radial-gradient(circle at 90% 15%, var(--pink-soft) 0%, transparent 40%),
      radial-gradient(circle at 50% 100%, #FFF0F4 0%, transparent 60%);
    min-height: 100vh;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    padding-bottom: 90px;
  }

  /* ---------- Stars (signature ambient element) ---------- */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    max-width: 480px;
    margin: 0 auto;
  }
  .star {
    position: absolute;
    color: var(--rose);
    opacity: 0.55;
    animation: twinkle 5s ease-in-out infinite;
  }
  .star.gold { color: var(--gold); }
  .star svg { display: block; width: 100%; height: 100%; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.25; transform: scale(0.85) translateY(0px); }
    50% { opacity: 0.7; transform: scale(1.05) translateY(-3px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .star { animation: none; opacity: 0.45; }
  }

  /* ---------- Header / Nav ---------- */
  header.top {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(255, 249, 251, 0.88);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 18px 22px 14px;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.01em;
    color: var(--plum-deep);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .brand .dot { color: var(--rose); font-size: 18px; }
  .subdate {
    font-size: 13px;
    color: var(--plum-text);
    opacity: 0.65;
    margin-top: 2px;
    font-weight: 500;
  }

  nav.tabs {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }
  nav.tabs button {
    flex: 1;
    border: none;
    background: transparent;
    padding: 9px 6px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--plum-text);
    opacity: 0.55;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  nav.tabs button.active {
    background: var(--plum-deep);
    color: var(--paper);
    opacity: 1;
  }

  main {
    position: relative;
    z-index: 1;
    padding: 20px 18px 0;
  }

  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ---------- Cards ---------- */
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 18px 18px 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--plum-deep);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .help-btn {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid var(--pink-mid);
    background: var(--pink-soft);
    color: var(--rose);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'Inter', sans-serif;
    line-height: 1;
    padding: 0;
  }
  .help-btn:hover { background: var(--pink-mid); }
  .help-btn:focus-visible, button:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--rose);
    outline-offset: 2px;
  }

  .pill-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .pill {
    background: var(--pink-soft);
    color: var(--plum-deep);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 999px;
  }
  .pill.deep { background: var(--plum-deep); color: var(--paper); }

  .big-stat {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--plum-deep);
    line-height: 1.15;
    margin: 2px 0 2px;
  }
  .sub-stat {
    font-size: 13px;
    color: var(--plum-text);
    opacity: 0.75;
  }
  .blurb {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--plum-text);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
  }

  .transit-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .transit-item:last-child { border-bottom: none; }
  .transit-item .planets {
    font-weight: 600;
    color: var(--plum-deep);
    flex: 1;
  }
  .transit-item .aspect-tag {
    font-size: 11px;
    background: var(--pink-soft);
    color: var(--rose);
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .retro-mark { color: var(--gold); font-weight: 700; font-size: 11px; }

  .link-btn {
    background: none;
    border: none;
    color: var(--rose);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    padding: 8px 0 0;
    font-family: 'Inter', sans-serif;
  }

  .empty-note {
    font-size: 13px;
    color: var(--plum-text);
    opacity: 0.6;
    font-style: italic;
  }

  /* ---------- Mood card ---------- */
  .mood-scale {
    display: flex;
    justify-content: space-between;
    gap: 6px;
    margin-top: 6px;
  }
  .mood-btn {
    flex: 1;
    aspect-ratio: 1;
    border-radius: 14px;
    border: 1.5px solid var(--line);
    background: var(--paper);
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mood-btn:hover { background: var(--pink-soft); }
  .mood-btn.selected {
    background: var(--rose);
    border-color: var(--rose);
    transform: scale(1.08);
  }
  .mood-note-input {
    width: 100%;
    margin-top: 10px;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--plum-text);
    resize: none;
    background: var(--paper);
  }
  .mood-note-input:focus { outline: 2px solid var(--pink-mid); }
  .save-mood-btn {
    margin-top: 10px;
    width: 100%;
    background: var(--plum-deep);
    color: var(--paper);
    border: none;
    border-radius: 12px;
    padding: 11px;
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .save-mood-btn:active { transform: scale(0.98); }
  .saved-confirm {
    font-size: 12.5px;
    color: var(--rose);
    margin-top: 8px;
    font-weight: 600;
    display: none;
  }

  /* ---------- Year view ---------- */
  .year-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    background: var(--pink-soft);
    border-radius: 14px;
    padding: 4px;
  }
  .year-toggle button {
    flex: 1;
    border: none;
    background: transparent;
    padding: 8px;
    border-radius: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--plum-deep);
    cursor: pointer;
  }
  .year-toggle button.active { background: #fff; box-shadow: 0 1px 6px rgba(92,68,86,0.12); }

  .month-block { margin-bottom: 18px; }
  .month-label {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    color: var(--plum-deep);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 9px;
    background: #fff;
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--plum-text);
    cursor: pointer;
    position: relative;
  }
  .cal-day.blank { visibility: hidden; }
  .cal-day.today { border: 1.5px solid var(--rose); color: var(--rose); }
  .cal-day .dot-marks {
    position: absolute;
    bottom: 3px;
    display: flex;
    gap: 1px;
  }
  .dot-marks span {
    width: 4px; height: 4px; border-radius: 50%;
  }
  .dot-marks .m-transit { background: var(--rose); }
  .dot-marks .m-voc { background: var(--gold); }
  .dot-marks .m-prog { background: var(--plum-deep); }
  .cal-day:hover { background: var(--pink-soft); }

  .legend-row {
    display: flex;
    gap: 14px;
    font-size: 11.5px;
    color: var(--plum-text);
    opacity: 0.75;
    margin: 10px 2px 4px;
    flex-wrap: wrap;
  }
  .legend-row span { display: flex; align-items: center; gap: 4px; }
  .legend-row .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  .timeline-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .timeline-date {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--rose);
    min-width: 64px;
    padding-top: 2px;
  }
  .timeline-text { font-size: 13.5px; color: var(--plum-text); }
  .timeline-text strong { color: var(--plum-deep); }

  /* ---------- Bottom nav ---------- */
  nav.bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 480px;
    margin: 0 auto;
    background: rgba(255,249,251,0.92);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    display: flex;
    z-index: 10;
  }
  nav.bottom-nav button {
    flex: 1;
    background: none;
    border: none;
    padding: 12px 4px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--plum-text);
    opacity: 0.5;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  nav.bottom-nav button.active { opacity: 1; color: var(--rose); }
  nav.bottom-nav button svg { width: 20px; height: 20px; }

  /* ---------- Modal (glossary + day detail) ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(44,36,54,0.45);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal-sheet {
    background: var(--paper);
    border-radius: 24px 24px 0 0;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 22px 22px 32px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle {
    width: 36px; height: 4px; background: var(--line); border-radius: 99px;
    margin: 0 auto 16px;
  }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    color: var(--plum-deep);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .modal-body { font-size: 14px; line-height: 1.6; color: var(--plum-text); }
  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    background: var(--pink-soft);
    border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    color: var(--plum-deep);
    font-size: 14px;
    cursor: pointer;
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--plum-text);
    opacity: 0.6;
    font-size: 14px;
  }

  h1, h2, h3, p { margin: 0; }
</style>
</head>
<body>

<div class="stars" id="starsLayer"></div>

<div class="app">
  <header class="top">
    <div class="brand"><span class="dot">✶</span>Sky Journal</div>
    <div class="subdate" id="headerDate">Loading...</div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="today">Today</button>
      <button class="tab-btn" data-tab="year">Year Ahead</button>
      <button class="tab-btn" data-tab="mood">Mood History</button>
    </nav>
  </header>

  <main>
    <!-- TODAY VIEW -->
    <section class="view active" id="view-today"></section>

    <!-- YEAR VIEW -->
    <section class="view" id="view-year"></section>

    <!-- MOOD HISTORY VIEW -->
    <section class="view" id="view-mood"></section>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-sheet">
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="app_data.js"></script>
<script src="glossary.js"></script>
<script src="interpretations.js"></script>
<script src="app.js"></script>
</body>
</html>
